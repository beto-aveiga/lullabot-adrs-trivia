<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADR Trivia – Lullabot Architecture Decisions</title>
  <meta name="description" content="Test your knowledge of Lullabot's Architecture Decision Records in this fun trivia game." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            teal: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
              900: '#134e4a',
              950: '#042f2e',
            },
          },
          keyframes: {
            shake: {
              '0%, 100%': { transform: 'translateX(0)' },
              '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-4px)' },
              '20%, 40%, 60%, 80%': { transform: 'translateX(4px)' },
            },
            'pulse-heart': {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.3)' },
            },
            'roll-up': {
              '0%': { transform: 'translateY(100%)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
          },
          animation: {
            shake: 'shake 0.4s ease-in-out',
            'pulse-heart': 'pulse-heart 0.8s ease-in-out infinite',
            'roll-up': 'roll-up 0.3s ease-out',
          },
        },
      },
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
  <div id="app" class="max-w-2xl mx-auto px-4 py-8"></div>
  <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-50"></canvas>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
