name: lullabot-adrs-trivia
type: generic
docroot: ""
nodejs_version: "22"
corepack_enable: false
use_dns_when_possible: true
omit_containers: [db]

web_extra_exposed_ports:
  - name: vite
    container_port: 5173
    http_port: 5172
    https_port: 5173

hooks:
  post-start:
    - exec: npm install
